name: daily-publish

on:
  workflow_run:
    workflows: ["daily-research"]
    types: [completed]
  schedule:
    - cron: "50 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-publish
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/publish.py
      - run: python app/validate.py data/latest.json

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json docs/index.html docs/latest.json
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
          else
            git commit -m "Publish World Cup prediction site"
            git push
          fi
