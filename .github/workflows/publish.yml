name: daily-publish-1000

on:
  schedule:
    # 10:00 Asia/Shanghai = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: daily-publish-1000
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/validate.py data/latest.json

      - name: Trigger GitHub Pages build
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

      - name: Write publish log
        run: |
          mkdir -p logs
          cat > logs/latest-publish.log <<EOF
          stage=10:00 deploy GitHub Pages
          repository=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF}
          sha=${GITHUB_SHA}
          run_id=${GITHUB_RUN_ID}
          EOF
