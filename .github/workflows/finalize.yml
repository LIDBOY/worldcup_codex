name: daily-finalize-0930

on:
  schedule:
    # 09:30 Asia/Shanghai = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-finalize-0930
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/pipeline.py finalize
      - run: python app/validate.py data/latest.json

      - name: Commit latest JSON and Pages data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json docs/index.html docs/latest.json docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No latest changes to commit."
          else
            git commit -m "Finalize Agent latest JSON"
            git push
          fi
