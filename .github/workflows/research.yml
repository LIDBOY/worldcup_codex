name: daily-research

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/research.py
      - run: python app/validate.py data/latest.json

      - name: Commit generated research data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No research data changes to commit."
          else
            git commit -m "Update World Cup prediction data"
            git push
          fi
