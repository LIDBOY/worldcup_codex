name: daily-research-0815

on:
  schedule:
    # 08:15 Asia/Shanghai = 00:15 UTC
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-research-0815
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/pipeline.py research

      - name: Commit Agent research data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json
          if git diff --cached --quiet; then
            echo "No research changes to commit."
          else
            git commit -m "Research FIFA fixtures injuries and odds"
            git push
          fi
