name: daily-render-0900

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-render-0900
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/pipeline.py render

      - name: Commit V4-Flash render output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/render.json docs/index.html docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No render changes to commit."
          else
            git commit -m "Render DeepSeek V4-Flash Agent HTML"
            git push
          fi
