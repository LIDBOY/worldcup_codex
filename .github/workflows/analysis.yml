name: daily-analysis-0940

on:
  schedule:
    # 09:40 Asia/Shanghai = 01:40 UTC
    - cron: "40 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-analysis-0940
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: python -m pip install -r requirements.txt
      - run: python app/pipeline.py analysis

      - name: Commit V4-Pro analysis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analysis.json data/fixtures.json
          if git diff --cached --quiet; then
            echo "No analysis changes to commit."
          else
            git commit -m "Complete DeepSeek V4-Pro analysis"
            git push
          fi
